services:
  - type: web
    name: zoho-invoice-agent
    runtime: python
    repo: https://github.com/Liranham/zoho-invoice-agent
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 main.py
    envVars:
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: ZOHO_ORGANIZATION_ID
        sync: false
      - key: ZOHO_API_BASE_URL
        sync: false
      - key: ZOHO_ACCOUNTS_URL
        sync: false
      - key: ZOHO_DEFAULT_CUSTOMER_ID
        sync: false
      - key: ZOHO_DEFAULT_ITEM_ID
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_RECURRING_CRON
        sync: false
      # Wise direct-API (primary path)
      - key: WISE_ENABLED
        value: "true"
      - key: WISE_API_TOKEN
        sync: false
      - key: WISE_PRIVATE_KEY_B64
        sync: false
      - key: WISE_PROFILE_ID
        sync: false
      - key: WISE_WEBHOOK_BASE_URL
        sync: false
      # Gmail flow stays dormant until Wise path is proven
      - key: GMAIL_ENABLED
        value: "false"
      - key: GMAIL_CREDENTIALS_B64
        sync: false
      - key: GMAIL_TOKEN_B64
        sync: false
      # Telegram (shared by both flows)
      - key: TELEGRAM_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
